<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">

<defs>

<!-- Luxor gold gradient -->
<linearGradient id="luxorGold" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#f5d37a"></stop>
<stop offset="50%" stop-color="#d4a437"></stop>
<stop offset="100%" stop-color="#8c6a1b"></stop>
</linearGradient>

<!-- glow -->
<filter id="goldGlow">
<feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#d4a437"></feDropShadow>
</filter>

</defs>

<!-- dark background -->
<rect width="120" height="120" rx="16" fill="#0b0b0c"></rect>

<!-- animated loader -->
<g filter="url(#goldGlow)" fill="none" stroke="url(#luxorGold)" stroke-width="6">

<circle cx="60" cy="60" r="40" stroke-dasharray="180">

<animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="1.2s" repeatCount="indefinite"></animateTransform>

</circle>

</g>

</svg>